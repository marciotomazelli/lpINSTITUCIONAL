name: Deploy to HostGator

on:
  push:
    branches:
      - main  # Ajuste para 'master' se for o nome da sua branch principal

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./ # Tentando o diretório raiz do login FTP
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          site_esteticabio_v*.zip
          README.md
          database.sql
          migration.php
